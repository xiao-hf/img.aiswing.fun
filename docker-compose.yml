version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiswing-image-studio
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-3000}
      - UPSTREAM=${UPSTREAM:-http://sub2api:8080}
      - STREAM_UPSTREAM=${STREAM_UPSTREAM:-https://cdn.aiswing.fun}
      - TASK_STREAM_MODE=${TASK_STREAM_MODE:-false}
      - MAX_BODY_BYTES=${MAX_BODY_BYTES:-62914560}
      - DATA_DIR=${DATA_DIR:-/app/data}
      - SQLITE_PATH=${SQLITE_PATH:-/app/data/aiswing.sqlite}
      - TASK_TTL_HOURS=${TASK_TTL_HOURS:-48}
      - KEY_ENCRYPTION_SECRET=${KEY_ENCRYPTION_SECRET:-change-this-secret-before-production}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-1}
      - UPSTREAM_PARTIAL_IMAGES=${UPSTREAM_PARTIAL_IMAGES:-0}
      - UPSTREAM_ACCEPT_PARTIAL_FALLBACK=${UPSTREAM_ACCEPT_PARTIAL_FALLBACK:-true}
      - TASK_MAX_RETRIES=${TASK_MAX_RETRIES:-0}
      - TASK_RETRY_BASE_DELAY_MS=${TASK_RETRY_BASE_DELAY_MS:-3000}
      - CLEANUP_INTERVAL_MINUTES=${CLEANUP_INTERVAL_MINUTES:-10}
      - UPDATE_TOKEN=${UPDATE_TOKEN:-}
      - UPDATE_RESTART=${UPDATE_RESTART:-true}
      - UPDATE_TIMEOUT_MS=${UPDATE_TIMEOUT_MS:-600000}
    volumes:
      - ./data:/app/data
    networks:
      - default
      - sub2api_net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  sub2api_net:
    external: true
    name: ${SUB2API_NETWORK:-sub2api_default}
