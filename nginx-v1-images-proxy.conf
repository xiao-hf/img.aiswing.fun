# 宝塔站点 img.aiswing.fun 的 Nginx 配置中加入：
# 位置：网站 -> img.aiswing.fun -> 配置文件，放在 server { ... } 内。
# 作用：让前端同域请求 https://img.aiswing.fun/v1/images/*，由 Nginx 转发到 https://gpt.aiswing.fun/v1/images/*。

location ^~ /v1/images/ {
    proxy_pass https://gpt.aiswing.fun;
    proxy_ssl_server_name on;
    proxy_set_header Host gpt.aiswing.fun;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    client_max_body_size 50m;
    proxy_request_buffering off;
}
