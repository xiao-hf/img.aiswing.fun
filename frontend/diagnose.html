<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aiswing 部署诊断</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; background: #f7f4ea; color: #1f2933; }
    h1 { font-size: 22px; }
    button { padding: 10px 16px; border: 0; border-radius: 10px; background: #058879; color: #fff; font-weight: 700; cursor: pointer; }
    .item { margin: 12px 0; padding: 14px; border-radius: 12px; background: #fff; border: 1px solid #e4ded0; }
    .ok { border-color: #36b37e; }
    .bad { border-color: #e55353; }
    code, pre { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Aiswing 部署诊断</h1>
  <p>用于检查静态文件版本、后端 health、以及 /api/tasks 是否正常返回。</p>
  <button id="run">开始诊断</button>
  <div id="result"></div>

  <script>
    const result = document.getElementById("result");
    const now = () => Date.now();
    function add(title, ok, detail) {
      const box = document.createElement("div");
      box.className = `item ${ok ? "ok" : "bad"}`;
      box.innerHTML = `<strong>${ok ? "✓" : "✗"} ${title}</strong><pre>${detail}</pre>`;
      result.appendChild(box);
    }
    async function getText(url, options) {
      const response = await fetch(url, options);
      const text = await response.text();
      return { response, text };
    }
    async function run() {
      result.innerHTML = "";
      const base = location.origin;
      add("当前站点", true, base);
      try {
        const { response, text } = await getText(`${base}/version.txt?_=${now()}`);
        add("version.txt 覆盖检查", response.ok && text.includes("frontend build 2026050705"), `HTTP ${response.status}
${text.slice(0, 500)}`);
      } catch (error) { add("version.txt 覆盖检查", false, error.message); }
      try {
        const { response, text } = await getText(`${base}/health?_=${now()}`);
        add("health 检查", response.ok && text.includes("sqlite-async-tasks"), `HTTP ${response.status}
${text.slice(0, 500)}`);
      } catch (error) { add("health 检查", false, error.message); }
      try {
        const { response, text } = await getText(`${base}/api/tasks?limit=1&_=${now()}`, { headers: { Authorization: "Bearer sk-invalid-diagnose" } });
        add("/api/tasks 认证检查", response.status === 200 || response.status === 404 || response.status === 401, `HTTP ${response.status}
${text.slice(0, 800)}`);
      } catch (error) { add("/api/tasks 认证检查", false, error.message); }
    }
    document.getElementById("run").addEventListener("click", run);
    run();
  </script>
</body>
</html>
