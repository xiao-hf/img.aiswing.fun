<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aiswing Image Studio</title>
    <link rel="stylesheet" href="./styles.css?v=2026050951" />
      <style>
      /* critical-fullscreen-layout */
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body > .app-shell { width: 100vw; max-width: none; height: 100dvh; margin: 0; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="任务历史">
        <div class="sidebar-header">
          <div class="sidebar-actions">
            <button id="newTaskButton" class="primary small" type="button">新建</button>
            <button id="refreshTasksButton" class="secondary small" type="button">刷新</button>
            <button id="clearLocalButton" class="secondary small" type="button">清空</button>
          </div>
          <a class="secondary small doc-button" id="docsLink" href="./docs.html" target="_blank" rel="noopener">API 文档</a>
        </div>
        <div class="sidebar-key-row">
          <button id="apiKeyButton" class="secondary small api-key-sidebar-button" type="button">填写 API Key</button>
        </div>
        <div class="sidebar-meta">
          <span><strong id="taskCount">0</strong> 个任务</span>
          <span><strong id="runningCount">0</strong> 处理中</span>
        </div>
        <div id="taskList" class="task-list"></div>
      </aside>

      <main class="main-pane">
        <div class="main-header">
          <button id="langToggle" class="lang-toggle" type="button" aria-label="切换语言" title="切换语言"><span class="lang-zh">中文</span><span class="lang-en">EN</span></button><button id="themeToggle" class="theme-toggle" type="button" aria-label="切换主题" title="切换深色/浅色模式">
            <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>

        <section id="resultViewport" class="result-viewport" aria-live="polite">
          <div class="empty-hero">
            <h2>Turn ideas into images</h2>
            <p>输入提示词即可创建后台任务；任务按 API Key 隔离，完成后保留 48 小时。</p>
          </div>
        </section>

        <section class="composer" aria-label="生成参数">
          <div id="referencePreviewList" class="reference-strip"></div>

          <div class="composer-box">
            <textarea
              id="promptInput"
              rows="4"
              placeholder="输入你想生成的画面，也可以拖入/粘贴参考图"
            ></textarea>
            <div id="dropHint" class="drop-hint">松开鼠标，添加为参考图</div>
            <div class="composer-controls">
              <div class="left-controls">
                <label class="upload-pill">
                  <input id="referenceInput" type="file" accept="image/*" multiple />
                  <span id="referenceButtonText">上传参考图</span>
                </label>
                <label class="pill-field">
                  <span>模型</span>
                  <select id="modelSelect">
                    <option value="gpt-image-2">gpt-image-2</option>
                    <option value="gpt-image-1">gpt-image-1</option>
                    <option value="gpt-image-1.5">gpt-image-1.5</option>
                  </select>
                </label>
                <label class="pill-field">
                  <span>尺寸</span>
                  <select id="sizeSelect">
                    <option value="1024x1024">1024x1024</option>
                    <option value="1536x1024">1536x1024</option>
                    <option value="1024x1536">1024x1536</option>
                    <option value="3840x2160">3840x2160 4K</option>
                    <option value="2160x3840">2160x3840 4K</option>
                    <option value="2880x2880">2880x2880</option>
                    <option value="auto">auto</option>
                  </select>
                </label>
                <label class="pill-field compact">
                  <span>质量</span>
                  <select id="qualitySelect">
                    <option value="">默认</option>
                    <option value="auto">auto</option>
                    <option value="low">low</option>
                    <option value="medium">medium</option>
                    <option value="high">high</option>
                  </select>
                </label>
                <label class="pill-field compact">
                  <span>格式</span>
                  <select id="formatSelect">
                    <option value="png">png</option>
                    <option value="jpeg">jpeg</option>
                    <option value="webp">webp</option>
                  </select>
                </label>
              </div>
              <div class="composer-actions">
                <button id="copyComposerCurlButton" class="secondary small copy-curl-inline" type="button">&#22797;&#21046; curl</button>
                <button id="generateButton" class="send-button" type="button" aria-label="生成图片">↑</button>
              </div>
            </div>
          </div>
          <input id="apiKeyInput" type="password" autocomplete="off" hidden />
          <input id="baseUrlInput" type="hidden" value="" />
          <div id="statusBox" class="status hidden-status" hidden>&#20934;&#22791;&#23601;&#32490;</div>
        </section>
      </main>
    </div>

    <div id="apiKeyModal" class="modal-backdrop" hidden>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="apiKeyModalTitle">
        <button id="apiKeyCloseButton" class="modal-close" type="button" aria-label="&#20851;&#38381;">&times;</button>
        <h2 id="apiKeyModalTitle">&#22635;&#20889; API Key</h2>
        <input id="apiKeyModalInput" class="modal-input" type="password" placeholder="sk-..." autocomplete="off" />
        <div class="modal-actions">
          <button id="apiKeyClearButton" class="secondary small" type="button">&#28165;&#31354;</button>
          <button id="apiKeySaveButton" class="primary small" type="button">&#20445;&#23384;</button>
        </div>
      </div>
    </div>

    <template id="taskTemplate">
      <article class="task-item">
        <button class="task-main" type="button">
          <span class="task-title"></span>
          <span class="task-meta"></span>
          <span class="task-status"></span>
        </button>
        <button class="task-delete" type="button" title="删除任务">×</button>
      </article>
    </template>

    <script src="./app.js?v=2026050951"></script>
  </body>
</html>
