<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aiswing Image Studio</title>
    <link rel="stylesheet" href="./styles.css?v=2026050715" />
      <style>
      /* critical-fullscreen-layout */
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body > .app-shell { width: 100vw; max-width: none; height: 100dvh; margin: 0; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="任务历史">
        <div class="sidebar-actions">
          <button id="newTaskButton" class="primary small" type="button">新建</button>
          <button id="refreshTasksButton" class="secondary small" type="button">刷新</button>
          <button id="clearLocalButton" class="secondary small" type="button">清空</button>
        </div>
        <div class="sidebar-meta">
          <span><strong id="taskCount">0</strong> 个任务</span>
          <span><strong id="runningCount">0</strong> 处理中</span>
        </div>
        <div id="taskList" class="task-list"></div>
      </aside>

      <main class="main-pane">

        <section id="resultViewport" class="result-viewport" aria-live="polite">
          <div class="empty-hero">
            <h2>Turn ideas into images</h2>
            <p>输入提示词即可创建后台任务；任务按 API Key 隔离，完成后保留 48 小时。</p>
          </div>
        </section>

        <section class="composer" aria-label="生成参数">
          <div id="referencePreviewList" class="reference-strip"></div>

          <div class="composer-box">
            <textarea
              id="promptInput"
              rows="4"
              placeholder="输入你想生成的画面，也可以拖入/粘贴参考图"
            ></textarea>
            <div id="dropHint" class="drop-hint">松开鼠标，添加为参考图</div>
            <div class="composer-controls">
              <div class="left-controls">
                <label class="upload-pill">
                  <input id="referenceInput" type="file" accept="image/*" multiple />
                  <span id="referenceButtonText">上传参考图</span>
                </label>
                <label class="pill-field">
                  <span>模型</span>
                  <select id="modelSelect">
                    <option value="gpt-image-2">gpt-image-2</option>
                    <option value="gpt-image-1">gpt-image-1</option>
                    <option value="gpt-image-1.5">gpt-image-1.5</option>
                  </select>
                </label>
                <label class="pill-field">
                  <span>尺寸</span>
                  <select id="sizeSelect">
                    <option value="1024x1024">1024x1024</option>
                    <option value="1536x1024">1536x1024</option>
                    <option value="1024x1536">1024x1536</option>
                    <option value="3840x2160">3840x2160 4K</option>
                    <option value="2160x3840">2160x3840 4K</option>
                    <option value="2880x2880">2880x2880</option>
                    <option value="auto">auto</option>
                  </select>
                </label>
                <label class="pill-field compact">
                  <span>质量</span>
                  <select id="qualitySelect">
                    <option value="">默认</option>
                    <option value="auto">auto</option>
                    <option value="low">low</option>
                    <option value="medium">medium</option>
                    <option value="high">high</option>
                  </select>
                </label>
                <label class="pill-field compact">
                  <span>格式</span>
                  <select id="formatSelect">
                    <option value="png">png</option>
                    <option value="jpeg">jpeg</option>
                    <option value="webp">webp</option>
                  </select>
                </label>
              </div>
              <button id="generateButton" class="send-button" type="button" aria-label="生成图片">↑</button>
            </div>
          </div>

          <details id="advancedSettings" class="advanced">
            <summary><span>API Key 与快捷操作</span><span id="advancedSummaryHint" class="summary-hint"></span></summary>
            <div class="advanced-grid">
              <label class="field secret-field">
                <span>API Key</span>
                <div class="secret-row">
                  <input id="apiKeyInput" type="password" placeholder="sk-..." autocomplete="off" />
                  <button id="toggleKeyButton" class="secondary small" type="button">显示</button>
                </div>
              </label>
              <input id="baseUrlInput" type="hidden" value="" />
              <button id="demoButton" class="secondary" type="button">填入示例</button>
              <button id="copyCurlButton" class="secondary" type="button">复制 API 请求</button>
            </div>
          </details>

          <div id="statusBox" class="status idle">准备就绪</div>
        </section>
      </main>
    </div>

    <template id="taskTemplate">
      <article class="task-item">
        <button class="task-main" type="button">
          <span class="task-title"></span>
          <span class="task-meta"></span>
          <span class="task-status"></span>
        </button>
        <button class="task-delete" type="button" title="删除任务">×</button>
      </article>
    </template>

    <script src="./app.js?v=2026050715"></script>
  </body>
</html>
